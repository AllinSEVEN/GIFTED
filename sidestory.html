‘วันนี้ไม่รีบกลับเหมือนทุกครั้งใช่ไหมเนี้ย’

‘วิเทสก็อยากมี อยากมีมานานแล้ว เวลาของเรา’

ดวงดาวดวงนั้นขยายกว้างบริเวณ ในขณะที่ซเวตพล้อยหลับไปแล้ว และวิเทสยังคงตื่นเพื่อรับชมความโหยหาจับใจนี้
แสงสว่างจากดวงดาวที่ขยายวง พุ่งตัวมาที่เขาอย่างจัง
สว่างวาบแต่ไม่มีความเจ็บปวด
.
.
.
‘คุณวินเนอร์คะ ตื่นได้แล้วค่ะ’ ป้าแม่บ้านเปิดประตูเข้ามาปลุกวินเนอร์ด้วยการเปิดไฟสว่าง
‘วันนี้คุณวินเนอร์มีเรียนพิเศษช่วงเช้าที่ชั้นล่างนะคะ ใกล้ถึงเวลาเรียนแล้วค่ะ’ คุณป้าพูดต่อ
‘วันนี้ช่วงบ่ายผมว่างไหมครับ’

‘ผมขอไปหาเพื่อนที่ข้างบ้านหินนะครับ’
‘เพื่อนคนไหนหรอคะคุณวินเนอร์’
‘เพื่อนใหม่ผม สตางค์’
.

หนุ่มน้อยตื่นขึ้นมาบนเตียง จากบ้านที่เรียบง่ายแต่เต็มไปด้วยประวัติศาสตร์เรื่องราวมากมาย
‘นี่เราฝันไปหรอเนี้ย’
‘เหมือนจริงเกิ้น แต่เขาจะกลับมาอีกไหมนะ ไม่รู้เลย อยากเล่นกับเขาอีกเหมือนกันนะเนี้ย’
‘เขาชื่ออะไรนะ วิน วินเนอร์ กับคนในฝันที่ชื่อ วิเทส’
‘ส่วนเรา สตางค์ กับเราในฝันที่ชื่อว่า ซเวต’

    function renderSideStories() {
        const list = document.getElementById('ss-list');
        list.innerHTML = sideStories.map((s, i) => `
            <div class="ss-card" id="ss-card-${i}">
                <div class="ss-card-head" onclick="toggleSideStory(${i})">
                    <div class="ss-card-top">
                        <span class="ss-pair-tag">${s.pair}</span>
                        <button class="ss-toggle" aria-label="เผยตอนทั้งหมด">
                            <i class="fa-solid fa-chevron-down"></i>
                        </button>
                    </div>
                    <p class="ss-title-preview">${s.title}</p>
                    <p class="ss-preview">${s.preview}</p>
                </div>
                <div class="ss-body">
                    <div class="ss-body-inner">
                        <h2 class="ss-full-title">${s.title}</h2>
                        <p class="ss-full-pair">${s.pair}</p>
                        <div class="ss-divider"></div>
                        <div class="ss-full-content">${s.content}</div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function toggleSideStory(index) {
        const card = document.getElementById(`ss-card-${index}`);
        const body = card.querySelector('.ss-body');
        const isOpen = card.classList.contains('open');

        if (isOpen) {
            body.style.maxHeight = '0px';
            card.classList.remove('open');
        } else {
            card.classList.add('open');
            body.style.maxHeight = body.scrollHeight + 'px';
        }
    }

    renderSideStories();
</script>
