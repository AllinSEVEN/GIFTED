<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หลังโรงเรียน</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="sidestory.css">
    <!-- FontAwesome for standard icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<main class="content-area ss-wrap">

    <h3 class="ss-section-title">หลังโรงเรียน <span class="ss-star">⭐</span></h3>
    

    <div class="ss-list" id="ss-list">
        <!-- การ์ดแต่ละตอนถูกสร้างจากข้อมูลด้านล่างด้วย JavaScript -->
    </div>

</main>

<script src="script.js"></script>
<script>
    /*
      ===== แก้ไข/เพิ่มตอนได้ที่นี่ =====
      pair     -> ชื่อคู่ (ป้ายเล็กด้านบนซ้าย)
      title    -> ชื่อตอน
      preview  -> เนื้อหาส่วนต้น (ตัดจบสั้น ๆ ก่อนกด)
      content  -> เนื้อหาทั้งหมด ใช้ \n\n สำหรับขึ้นบรรทัดใหม่/เว้นวรรค
    */
    const sideStories = [
        {
            pair: "วิเทสซเวต",
            title: "ตอนที่ 20: จูบ - เจ็ทเซ็ตเตอร์",
            preview: "ช่วงเวลาหลังจากที่ทั้งสองได้พบกันแล้ว ภาพความจริงของเราจะเป็นยังไง เมื่อนึกถึงธรรมชาติ คุณนึกถึงอะไร...",
            content: "ช่วงเวลาหลังจากที่ทั้งสองได้พบกันแล้ว\nภาพความจริงของเราจะเป็นยังไง\n\nเมื่อนึกถึงธรรมชาติ คุณนึกถึงอะไร\nแผ่นสายนทีที่กว้างไกล เกาะเล็กที่ตั้งตระหง่าน สิ่งปลูกสร้างที่สง่างามและศักดิ์สิทธิ์\nต้นไม้ใบหญ้าเขียวชุ่มน้ำจากพื้นที่ใกล้ทะเลสาบ\nลมปลิวไสวพัดใบไม้ลอยล่อง\nพื้นที่ล้อมรอบด้วยธรรมชาติที่เป็นดั่งรั้วบ้านที่แข็งแกร่ง สร้างเสริมความเป็นบ้านให้เขา\nพื้นที่ที่ปลอดภัยยิ่งกว่าบ้าน\n\nวิเทสนั่งลงบนพื้นหญ้าที่อ่อนนุ่ม ชันขาขึ้นและนั่งกอดขาตัวเอง เกยคางที่เข่าและเงยหน้ามองนทีกว้างไกล ภาพดังเดิมที่เขาเคยพบเจอกับคนที่เขารัก\nแต่ตอนนี้กลับไม่พบเขาคนนั้นอีกแล้ว\nเรื่องราวของคนที่นั่งพื้นหญ้าข้าง ๆ ที่พื้นที่เป็นหลุมยุบลงไปเล็กน้อย\n.\n.\nเสียงเหยียบย่ำพุ่มหญ้าข้างหลังเกิดขึ้น มาพร้อมกับเสียงเด็ดดอกไม้บางอย่าง ดอกไม้ที่เขาเคยปลูกเอาไว้ก่อนจะหายตัวไปอย่างไม่มีวันกลับมาพบได้\nLily of the Valley\n\n'วันนี้ทำไมมานั่งก่อนเราได้เนี้ย เรียนจบแล้วหรอ'\nทำไม เขาถึงมาอยู่ตรงนี้ได้ ซเวต\n\nซเวตยิ้มเติมความสดชื่นให้วิเทสอย่างจริงใจ\n'อ่ะ เราให้ เป็นกำลังใจให้นะ' ซเวตพูดพร้อมยื่นดอกไม้ที่เขาถือ ที่เขาเคยปลูกและเป็นดั่งเจ้าบ้านของสถานที่แห่งนี้\nยื่นมันให้วิเทส เหมือนวันแรกที่เขาได้เจอกัน\n'อืม ขอบคุณ'\nวิเทสรับสิ่งให้กำลังใจจากซเวตมา\n'แล้ววิเทสเรียนจบแล้วหรอ'\n'เราแค่มานั่งพัก.. คิดถึงซเวตอยู่พอดี เลยมาหา'\nเขาอยู่ในช่วงเวลาตอนโต หลังจากเรียนจบมาแล้ว เป็นทหารมาแล้ว และกำลังกลับมาพักผ่อนที่บ้านเกิด\nส่วนสิ่งที่ซเวตมองเห็น คือช่วงเวลาในแต่ละเดือน ช่วงเดือนแรกที่ซเวตยังคงรอคอยเขาได้อย่างเต็มใจ\n'วันนี้ไม่รีบกลับเหมือนทุกครั้งใช่ไหมเนี้ย'\n'เราไม่รู้ ว่าเราจะอยู่ได้ถึงเมื่อไหร่ จะเก็บเกี่ยวความสุขได้ถึงเมื่อไหร่ และจะยังได้อยู่ด้วยกันจนถึงเมื่อไหร่'\n'ไม่เป็นไรเลย แค่วิเทสอยู่กับเราตรงนี้ก็เพียงพอแล้ว เรามีความสุขแล้ว'\n'เราอยากอยู่กับเธอ ทุกวันเลยนะ .. อยู่กับเราต่อนะ'\n'เอ๊ะ เราก็ยังอยู่ตรงนี้นะ ยังรอ ไม่ไปไหนหรอก'\n'อืม ตอนนี้.. เรายังอยู่ด้วยกัน งั้นเรามานั่งมองท้องฟ้าด้วยกันนะ อยู่มองดาวด้วยกันทั้งคืนเลย'\n'มันจะหนาวเอานะแบบนั้น'\n'ถึงจะหนาว แต่ก็ยังอยากอยู่ด้วยกัน ถ้าหนาวก็เอามือเข้าเสื้อวิเทสมา'\n'อืม งั้นเราอยู่ด้วยก็ได้'\n\nจากแสงขาวทอดส่องให้เงาจมใต้ดิน แสงนั้นแปรทิศทางไปอีกฝั่งจากช่วงเช้า และเปลี่ยนบรรยากาศรอบกายเป็นสีส้มแสงไสว กระจายทั้งบริเวณด้วยความอบอุ่นจากยามเย็น โอบกอดธรรมชาติมากมายของผืนป่าและทะเลสาบ\nแสงสีส้มเบี่ยงเบนอ่อนลงเป็นสีชมพูสวย ก่อนจะเจือจางและปะปนด้วยความมืดที่คืบคลานเข้ามา\nดวงดาวสวยระยิบบนท้องฟ้ากว้าง วันนี้พระจันทร์ยิ้มสวยมากให้กับความสัมพันธ์รักของเขา\n\n'มืดแล้ว สวยจัง' ซเวตกล่าวพูดหลังจากทั้งคู่เงียบสงบมาสักพัก\n'อยากให้สวยแบบนี้ทุกวันเลย สวยแบบนี้ที่นั่นด้วย เมืองใหญ่ไม่เห็นสวยกว่าที่นี่เลย จุดตรงนี้สวยที่สุดแล้ว'\n'แล้ววิเทสไม่ไปได้ไหม'\n'ถ้าไม่ไป พ่อก็ลากเราไปอยู่ดี เราหยุดเขาไม่ได้หรอก'\n'อยากมีเวลาแบบนี้ทุกวันเลย'\n'วิเทสก็อยากมี อยากมีมานานแล้ว เวลาของเรา'\n'งั้นก็อยู่กับเราสิ'\n'วันนึงเราก็ต้องไป'\n'เราไม่สามารถอยู่ที่นี่ได้ตลอดกาลนะ สักวันเราก็ต้องแยกจากกัน ดังนั้น อยู่กับเรานะ'\nคำพูดของซเวตแปลกไป\nทำไมเขาถึงรู้ว่าเราจะไม่ได้อยู่ที่นี่ด้วยกัน ทำไมถึงรู้ว่าสักวันเราต้องแยกจาก\nรวมถึงคำพูดของเขา มีศัพท์ที่ยากเกินกว่าจะเป็นเขาที่พูด\n\n'นี่ซเวตหรอ'\n'อืม เราซเวตไง ทำไมวิเทสถามงั้นอ่ะ'\n'คง.. ไม่มีอะไร เปล่า นอนมองดูดาวกันต่อดีกว่า'\n'นู้น ๆ ดาวตก'\n'ดาวตก เขาบอกมาว่าถ้าอธิษฐาน คำอธิษฐานนั้นจะเป็นจริง'\n'งั้นเราขออธิษฐานว่าาา.. ขอให้เราได้อยู่กับวิเทสไป.. ทุกที่ ทุกยุคสมัย ทุกชาติไป'\n'แล้วคำอธิษฐานของซเวต ขอให้มันเป็นจริง โดยไม่ต้องทนทุกข์ใด ๆ ก็ตาม'\nดวงดาวดวงนั้นระยิบระยับโต้ตอบ\nค่ำคืนที่เรามีกันนี้ มีความสุขเหลือเกิน เหมือนได้เติมเต็มช่วงเวลาที่หายไป อย่างไม่รู้ว่ามันหมายความว่าอย่างไร\n\nดวงดาวดวงนั้นขยายกว้างบริเวณ ในขณะที่ซเวตพล้อยหลับไปแล้ว และวิเทสยังคงตื่นเพื่อรับชมความโหยหาจับใจนี้\nแสงสว่างจากดวงดาวที่ขยายวง พุ่งตัวมาที่เขาอย่างจัง\nสว่างวาบแต่ไม่มีความเจ็บปวด\n.\n.\n.\n'คุณวินเนอร์คะ ตื่นได้แล้วค่ะ' ป้าแม่บ้านเปิดประตูเข้ามาปลุกวินเนอร์ด้วยการเปิดไฟสว่าง\n'วันนี้คุณวินเนอร์มีเรียนพิเศษช่วงเช้าที่ชั้นล่างนะคะ ใกล้ถึงเวลาเรียนแล้วค่ะ' คุณป้าพูดต่อ\n'วันนี้ช่วงบ่ายผมว่างไหมครับ'\n'คุณวินเนอร์เรียนถึงเที่ยง หลังจากนั้นไม่มีตารางงานอะไรค่ะ'\n'ผมขอไปหาเพื่อนที่ข้างบ้านหินนะครับ'\n'เพื่อนคนไหนหรอคะคุณวินเนอร์'\n'เพื่อนใหม่ผม สตางค์'\n.\n.\n.\nหนุ่มน้อยตื่นขึ้นมาบนเตียง จากบ้านที่เรียบง่ายแต่เต็มไปด้วยประวัติศาสตร์เรื่องราวมากมาย\n'นี่เราฝันไปหรอเนี้ย'\n'เหมือนจริงเกิ้น แต่เขาจะกลับมาอีกไหมนะ ไม่รู้เลย อยากเล่นกับเขาอีกเหมือนกันนะเนี้ย'\n'เขาชื่ออะไรนะ วิน วินเนอร์ กับคนในฝันที่ชื่อ วิเทส'\n'ส่วนเรา สตางค์ กับเราในฝันที่ชื่อว่า ซเวต'\nความรู้สึกต่าง ๆ ข้ามชาติภพมา\nทั้งสุข ทั้งทุกข์ ทั้งเติมเต็ม และทั้งเจ็บปวด ผสมผสานเรียงมาเป็นก้อนมวลอารมณ์ที่ตีขึ้นมา\n'อะไรกันเนี้ย นี่มันอะไรกัน'"
        }
    ];
 
    function renderSideStories() {
        const list = document.getElementById('ss-list');
        list.innerHTML = sideStories.map((s, i) => `
            <div class="ss-card" id="ss-card-${i}">
                <div class="ss-card-head" onclick="toggleSideStory(${i})">
                    <div class="ss-card-top">
                        <span class="ss-pair-tag">${s.pair}</span>
                        <button class="ss-toggle" aria-label="เผยตอนทั้งหมด">
                            <i class="fa-solid fa-chevron-down"></i>
                        </button>
                    </div>
                    <p class="ss-title-preview">${s.title}</p>
                    <p class="ss-preview">${s.preview}</p>
                </div>
                <div class="ss-body">
                    <div class="ss-body-inner">
                        <h2 class="ss-full-title">${s.title}</h2>
                        <p class="ss-full-pair">${s.pair}</p>
                        <div class="ss-divider"></div>
                        <div class="ss-full-content">${s.content}</div>
                    </div>
                </div>
            </div>
        `).join('');
    }
 
    function toggleSideStory(index) {
        const card = document.getElementById(`ss-card-${index}`);
        const body = card.querySelector('.ss-body');
        const isOpen = card.classList.contains('open');
 
        if (isOpen) {
            body.style.maxHeight = '0px';
            card.classList.remove('open');
        } else {
            card.classList.add('open');
            body.style.maxHeight = body.scrollHeight + 'px';
        }
    }
 
    renderSideStories();
</script>
 
</body>
</html>
